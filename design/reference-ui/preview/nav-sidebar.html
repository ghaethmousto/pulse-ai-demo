<!DOCTYPE html>
<html><head><meta charset="utf-8">
<style>
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-ExtraBold.ttf') format('truetype'); font-weight: 800; font-style: normal; font-display: swap; }
* { margin: 0; box-sizing: border-box; }
body { font-family: 'Raleway', sans-serif; background: #eae4df; padding: 0; display: flex; height: 460px; -webkit-font-smoothing: antialiased; }

.sidebar {
  width: 200px; min-width: 200px;
  background: #faf8f6;
  border-right: 1px solid rgba(92,69,69,0.10);
  display: flex; flex-direction: column;
  height: 100%;
}

.logo-area {
  padding: 16px 14px 14px;
  border-bottom: 1px solid rgba(92,69,69,0.08);
  display: flex; align-items: center; gap: 9px;
}
.logo-mark {
  width: 24px; height: 24px;
  background: #8d354b; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-mark svg { display: block; }
.logo-text { font-size: 13px; font-weight: 800; color: #201d1a; letter-spacing: -0.02em; }

/* Project selector */
.project-select {
  margin: 10px 10px 0;
  padding: 7px 10px;
  background: #fff;
  border: 1px solid rgba(92,69,69,0.10);
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 1px 2px rgba(32,29,26,0.04);
}
.ps-label { font-size: 8px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #a09690; margin-bottom: 2px; }
.ps-name  { font-size: 11px; font-weight: 600; color: #201d1a; display: flex; align-items: center; justify-content: space-between; }
.ps-chevron { color: #c0b8b2; font-size: 9px; }

/* Nav */
.nav-body { flex: 1; padding: 10px 8px 0; overflow: hidden; }
.nav-section-label {
  font-size: 8px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase;
  color: #c0b8b2; padding: 0 8px; margin-bottom: 3px; margin-top: 12px;
  display: block;
}
.nav-section-label:first-child { margin-top: 2px; }

.nav-item {
  position: relative;
  display: flex; align-items: center; gap: 9px;
  padding: 7px 8px; border-radius: 7px; margin-bottom: 1px;
  font-size: 12px; font-weight: 500; color: #6b6159;
  cursor: pointer; text-decoration: none;
  transition: background 120ms, color 120ms;
}
.nav-item:hover { background: rgba(92,69,69,0.05); color: #453c3a; }
.nav-item.active {
  background: rgba(141,53,75,0.07);
  color: #8d354b; font-weight: 600;
}
.nav-item.active::before {
  content: '';
  position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 2px; height: 14px;
  background: #8d354b; border-radius: 0 2px 2px 0;
}
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; opacity: 0.7; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-badge {
  margin-left: auto;
  min-width: 16px; height: 16px;
  background: #a34255; color: #fff;
  border-radius: 8px; padding: 0 4px;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.nav-badge.soft {
  background: rgba(92,69,69,0.10); color: #6b6159;
}

.sidebar-footer {
  padding: 10px 10px 14px;
  border-top: 1px solid rgba(92,69,69,0.07);
}
.role-pill {
  padding: 6px 10px; border-radius: 7px;
  background: rgba(141,53,75,0.07);
  border: 1px solid rgba(141,53,75,0.12);
  font-size: 10px; font-weight: 700; color: #8d354b;
  text-align: center; letter-spacing: 0.01em;
  margin-bottom: 8px;
}
.user-row { display: flex; align-items: center; gap: 8px; padding: 0 2px; }
.avatar { width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #8d354b, #6a2638); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 9px; font-weight: 700; flex-shrink: 0; }
.user-name { font-size: 11px; font-weight: 600; color: #453c3a; flex: 1; }
.user-role { font-size: 9px; color: #a09690; }

/* Main area */
.main { flex: 1; background: #f3eeea; display: flex; flex-direction: column; }
.topbar { height: 48px; background: #faf8f6; border-bottom: 1px solid rgba(92,69,69,0.09); display: flex; align-items: center; padding: 0 18px; gap: 12px; }
.page-title { font-size: 14px; font-weight: 700; letter-spacing: -0.02em; color: #201d1a; flex: 1; }
.topbar-icon { width: 30px; height: 30px; border-radius: 7px; border: 1px solid rgba(92,69,69,0.14); background: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; }
.canvas { flex: 1; padding: 18px; display: flex; align-items: flex-start; justify-content: flex-start; }
.placeholder { font-size: 11px; color: #c0b8b2; font-style: italic; }
</style></head>
<body>

<div class="sidebar">
  <div class="logo-area">
    <div class="logo-mark">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
        <path d="M1 6 L3 6 L4 3 L5.5 9 L7 4.5 L8 6 L9 6" stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="logo-text">Pulse AI</span>
  </div>

  <div class="project-select">
    <div class="ps-label">Active Project</div>
    <div class="ps-name">Al Noor Tower <span class="ps-chevron">▾</span></div>
  </div>

  <div class="nav-body">
    <span class="nav-section-label">Overview</span>
    <div class="nav-item active">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1.5" y="1.5" width="4.5" height="4.5" rx="1"/><rect x="8" y="1.5" width="4.5" height="4.5" rx="1"/><rect x="1.5" y="8" width="4.5" height="4.5" rx="1"/><rect x="8" y="8" width="4.5" height="4.5" rx="1"/></svg>
      </div>
      Overview
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2.5 2.5h9v1.5H2.5zm0 3.5h9v1.5H2.5zm0 3.5h6v1.5H2.5z"/></svg>
      </div>
      Documents
      <span class="nav-badge soft">22</span>
    </div>

    <span class="nav-section-label">Monitor</span>
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M7 2v1.5M7 10.5V12M2 7H3.5M10.5 7H12M3.76 3.76l1.06 1.06M9.18 9.18l1.06 1.06"/><circle cx="7" cy="7" r="2.5"/></svg>
      </div>
      Risks &amp; Issues
      <span class="nav-badge">3</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2.5 7.5l3 3 6-6"/></svg>
      </div>
      Approvals
      <span class="nav-badge">2</span>
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="2" y="3" width="10" height="8" rx="1"/><path d="M5 3V2M9 3V2M2 6h10"/></svg>
      </div>
      Timeline
    </div>

    <span class="nav-section-label">Platform</span>
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><rect x="1.5" y="2" width="11" height="10" rx="1.5"/><path d="M5 2v10"/></svg>
      </div>
      All Projects
    </div>
    <div class="nav-item">
      <div class="nav-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="7" cy="5" r="2.5"/><path d="M2.5 12c0-2.5 2-4 4.5-4s4.5 1.5 4.5 4"/></svg>
      </div>
      Team
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="role-pill">Owner Portal</div>
    <div class="user-row">
      <div class="avatar">GM</div>
      <div><div class="user-name">Ghaeth Mousto</div><div class="user-role">Management</div></div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="page-title">Al Noor Tower — Abu Dhabi</div>
    <div class="topbar-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#6b6159" stroke-width="1.5" stroke-linecap="round"><circle cx="6" cy="6" r="4"/><path d="M10.5 10.5l2 2"/></svg>
    </div>
    <div class="topbar-icon">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#6b6159" stroke-width="1.5" stroke-linecap="round"><path d="M7 2a3.5 3.5 0 0 1 3.5 3.5c0 2 .7 3 1.5 3.5H2c.8-.5 1.5-1.5 1.5-3.5A3.5 3.5 0 0 1 7 2z"/><path d="M5.5 9v.5a1.5 1.5 0 0 0 3 0V9"/></svg>
    </div>
    <div class="avatar" style="width:30px;height:30px;font-size:10px">GM</div>
  </div>
  <div class="canvas">
    <div class="placeholder">Dashboard content area</div>
  </div>
</div>

</body></html>
