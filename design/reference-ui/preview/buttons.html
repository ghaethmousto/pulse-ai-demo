<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Pulse AI — Buttons</title>
<style>
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-SemiBold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Raleway'; src: url('../fonts/Raleway-Bold.ttf') format('truetype'); font-weight: 700; font-style: normal; font-display: swap; }

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Raleway',sans-serif;
  background: linear-gradient(180deg, #f5f0ed 0%, #ede4de 100%);
  padding:24px;
  -webkit-font-smoothing:antialiased;
  color: #201d1a;
}
.name {
  font-size:10px; font-weight:600;
  letter-spacing:0.24em; text-transform:uppercase;
  color:#8a7d76; margin:0 0 12px 2px;
}
.row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }

/* ═══════════════════════════════════════════
   BASE
═══════════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; justify-content:center; gap: 8px;
  height: 38px; padding: 0 18px;
  border-radius: 9px;
  font-family: 'Raleway', sans-serif;
  font-size: 12.5px; font-weight: 600;
  letter-spacing: 0.01em; line-height: 1;
  cursor: pointer; border: 1px solid transparent;
  white-space: nowrap;
  position: relative;
  transition:
    background 220ms cubic-bezier(0.22, 1, 0.36, 1),
    border-color 220ms cubic-bezier(0.22, 1, 0.36, 1),
    box-shadow 220ms cubic-bezier(0.22, 1, 0.36, 1),
    transform 140ms cubic-bezier(0.22, 1, 0.36, 1),
    color 200ms ease;
}
.btn:active { transform: translateY(1px) scale(0.995); transition-duration: 80ms; }
.btn:focus-visible {
  outline: none;
  box-shadow: 0 0 0 3px rgba(141,53,75,0.24), 0 0 0 4px rgba(255,255,255,0.9);
}
.btn svg { display: block; flex-shrink: 0; }

/* ─── Primary — raised, burnished ─── */
.btn-p {
  background: linear-gradient(180deg, #9a3e55 0%, #7a2b3f 100%);
  color: #fff;
  border-color: rgba(0,0,0,0.14);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.18) inset,
    0 -1px 0 rgba(0,0,0,0.24) inset,
    0 1px 2px rgba(141,53,75,0.22),
    0 6px 16px -4px rgba(141,53,75,0.32);
}
.btn-p:hover {
  background: linear-gradient(180deg, #a54762 0%, #83304a 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.22) inset,
    0 -1px 0 rgba(0,0,0,0.24) inset,
    0 2px 4px rgba(141,53,75,0.28),
    0 12px 24px -6px rgba(141,53,75,0.42);
  transform: translateY(-1px);
}
.btn-p:active {
  background: linear-gradient(180deg, #7a2b3f 0%, #6b253a 100%);
  box-shadow:
    0 1px 2px rgba(0,0,0,0.22) inset,
    0 1px 1px rgba(141,53,75,0.18);
}

/* ─── Elevated secondary — definite clickable ─── */
.btn-s {
  background: linear-gradient(180deg, #ffffff 0%, #f7f1ec 100%);
  color: #201d1a;
  border-color: rgba(92,69,69,0.22);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 -1px 0 rgba(92,69,69,0.06) inset,
    0 1px 2px rgba(32,29,26,0.05),
    0 4px 10px -2px rgba(32,29,26,0.08);
}
.btn-s:hover {
  background: linear-gradient(180deg, #ffffff 0%, #faf5f1 100%);
  border-color: rgba(92,69,69,0.32);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 -1px 0 rgba(92,69,69,0.06) inset,
    0 2px 4px rgba(32,29,26,0.06),
    0 10px 22px -4px rgba(32,29,26,0.14);
  transform: translateY(-1px);
}
.btn-s:active {
  background: linear-gradient(180deg, #f3ede8 0%, #efe7e2 100%);
  box-shadow: 0 1px 2px rgba(32,29,26,0.08) inset;
}

/* ─── Outline — arrow-marker hero variant for "Enter Owner Portal" ─── */
.btn-o {
  background: #fdfbf9;
  color: #8d354b;
  border-color: rgba(141,53,75,0.32);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 1px 2px rgba(141,53,75,0.08),
    0 3px 8px -2px rgba(141,53,75,0.10);
}
.btn-o .arrow-wrap {
  width: 20px; height: 20px;
  border-radius: 50%;
  background: rgba(141,53,75,0.10);
  display: flex; align-items: center; justify-content: center;
  transition: background 220ms, transform 220ms cubic-bezier(0.22, 1, 0.36, 1);
}
.btn-o:hover {
  background: #fff;
  color: #7a2b3f;
  border-color: #8d354b;
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 2px 4px rgba(141,53,75,0.14),
    0 10px 22px -4px rgba(141,53,75,0.28);
  transform: translateY(-1px);
}
.btn-o:hover .arrow-wrap {
  background: #8d354b;
  transform: translateX(3px);
}
.btn-o:hover .arrow-wrap svg path { stroke: #fff; }
.btn-o:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(141,53,75,0.14) inset; }

/* ─── Tertiary — "ghost" cancel, still reads as a control ─── */
.btn-t {
  background: linear-gradient(180deg, rgba(255,255,255,0.62) 0%, rgba(247,241,236,0.82) 100%);
  color: #453c3a;
  border-color: rgba(92,69,69,0.16);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.9) inset,
    0 1px 1px rgba(32,29,26,0.03);
}
.btn-t:hover {
  background: linear-gradient(180deg, #ffffff 0%, #f7f1ec 100%);
  color: #201d1a;
  border-color: rgba(92,69,69,0.26);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 2px 4px rgba(32,29,26,0.05),
    0 6px 14px -4px rgba(32,29,26,0.10);
  transform: translateY(-1px);
}
.btn-t:active {
  background: linear-gradient(180deg, #f3ede8 0%, #efe7e2 100%);
  box-shadow: 0 1px 2px rgba(32,29,26,0.08) inset;
  transform: translateY(0);
}

/* ─── Destructive ─── */
.btn-d {
  background: linear-gradient(180deg, #ffffff 0%, #fbf4f5 100%);
  color: #a34255;
  border-color: rgba(163,66,85,0.30);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 1px 2px rgba(163,66,85,0.08),
    0 4px 10px -2px rgba(163,66,85,0.10);
}
.btn-d:hover {
  background: linear-gradient(180deg, #fef7f8 0%, #fbecee 100%);
  border-color: rgba(163,66,85,0.52);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 2px 4px rgba(163,66,85,0.14),
    0 10px 22px -4px rgba(163,66,85,0.24);
  transform: translateY(-1px);
}
.btn-d:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(163,66,85,0.14) inset; }

/* ─── Size ─── */
.btn-sm { height: 30px; padding: 0 13px; font-size: 11.5px; border-radius: 7px; gap: 6px; }

/* ─── Icon button ─── */
.btn-icon {
  width: 38px; height: 38px; padding: 0;
  display: inline-flex; align-items: center; justify-content: center;
  border-radius: 9px;
  background: linear-gradient(180deg, #ffffff 0%, #f7f1ec 100%);
  color: #6f615b;
  border: 1px solid rgba(92,69,69,0.22);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 1px 2px rgba(32,29,26,0.05),
    0 4px 10px -2px rgba(32,29,26,0.08);
  cursor: pointer;
  transition: all 220ms cubic-bezier(0.22, 1, 0.36, 1);
}
.btn-icon:hover {
  color: #201d1a;
  border-color: rgba(92,69,69,0.32);
  box-shadow:
    0 1px 0 rgba(255,255,255,1) inset,
    0 2px 4px rgba(32,29,26,0.06),
    0 10px 22px -4px rgba(32,29,26,0.14);
  transform: translateY(-1px);
}
.btn-icon:active { transform: translateY(0) scale(0.97); }

/* ═══════════════════════════════════════════
   DARK BAND
═══════════════════════════════════════════ */
.dark-band {
  margin-top: 8px;
  border-radius: 14px;
  padding: 22px 24px 18px;
  background:
    radial-gradient(ellipse 80% 60% at 10% 0%, rgba(141,53,75,0.22), transparent 60%),
    linear-gradient(180deg, #1f1a1a 0%, #16110f 100%);
  border: 1px solid rgba(238,235,232,0.08);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.06),
    inset 0 -1px 0 rgba(0,0,0,0.24),
    0 20px 40px -12px rgba(0,0,0,0.4);
}
.dark-band .name { color: #958780; }

.btn-dp {
  background: linear-gradient(180deg, #a14260 0%, #7a2b3f 100%);
  color: #fff;
  border-color: rgba(0,0,0,0.26);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.22) inset,
    0 -1px 0 rgba(0,0,0,0.28) inset,
    0 2px 4px rgba(0,0,0,0.28),
    0 10px 24px -6px rgba(141,53,75,0.50),
    0 0 24px rgba(207,89,118,0.14);
}
.btn-dp:hover {
  background: linear-gradient(180deg, #b24a6a 0%, #853147 100%);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.24) inset,
    0 -1px 0 rgba(0,0,0,0.28) inset,
    0 3px 6px rgba(0,0,0,0.32),
    0 16px 32px -8px rgba(141,53,75,0.60),
    0 0 32px rgba(207,89,118,0.22);
  transform: translateY(-1px);
}
.btn-dp:active { transform: translateY(0); box-shadow: 0 1px 2px rgba(0,0,0,0.32) inset; }

.btn-ds {
  background: linear-gradient(180deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
  color: #eeebe8;
  border-color: rgba(238,235,232,0.16);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.06) inset,
    0 -1px 0 rgba(0,0,0,0.24) inset,
    0 2px 6px rgba(0,0,0,0.18);
  backdrop-filter: blur(8px);
}
.btn-ds:hover {
  background: linear-gradient(180deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0.04) 100%);
  border-color: rgba(238,235,232,0.26);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.10) inset,
    0 -1px 0 rgba(0,0,0,0.24) inset,
    0 4px 12px rgba(0,0,0,0.24);
  transform: translateY(-1px);
}
.btn-ds:active { transform: translateY(0); }

.btn-dt {
  background: transparent; color: rgba(238,235,232,0.60);
  border-color: transparent; padding: 0 14px;
}
.btn-dt:hover { color: #eeebe8; background: rgba(255,255,255,0.06); }
</style></head>
<body>

<div class="name">Primary Actions</div>
<div class="row">
  <button class="btn btn-p">
    <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6.5L2.8 6.5L4.2 3.2L5.8 10L7.2 4.8L8.3 6.5L12 6.5"/></svg>
    Open Risk Review
  </button>
  <button class="btn btn-p">Approve</button>
  <button class="btn btn-p">Request Demo</button>
</div>

<div class="name">Hero Outline · Portal Entry</div>
<div class="row">
  <button class="btn btn-o">
    Enter Owner Portal
    <span class="arrow-wrap">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5H8M5.5 2L8 5L5.5 8" stroke="#8d354b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </button>
  <button class="btn btn-o">
    Enter Consultant Portal
    <span class="arrow-wrap">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M1.5 5H8M5.5 2L8 5L5.5 8" stroke="#8d354b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </span>
  </button>
</div>

<div class="name">Secondary &amp; Supporting</div>
<div class="row">
  <button class="btn btn-s">View Documents</button>
  <button class="btn btn-s">Export PDF</button>
  <button class="btn btn-t">Cancel</button>
  <button class="btn btn-d">Reject</button>
</div>

<div class="name">Utility · Small</div>
<div class="row">
  <button class="btn btn-p btn-sm">Approve</button>
  <button class="btn btn-s btn-sm">Export PDF</button>
  <button class="btn btn-d btn-sm">Reject</button>
  <div class="btn-icon" title="Settings">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="7" cy="7" r="2.4"/><path d="M7 1v1.4M7 11.6V13M13 7h-1.4M2.4 7H1M11.2 2.8l-1 1M3.8 10.2l-1 1M11.2 11.2l-1-1M3.8 3.8l-1-1"/></svg>
  </div>
  <div class="btn-icon" title="Search">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><circle cx="6" cy="6" r="4.2"/><path d="M10 10l2.4 2.4"/></svg>
  </div>
  <div class="btn-icon" title="Filter">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h10M4 7h6M5.5 11h3"/></svg>
  </div>
</div>

<div class="dark-band">
  <div class="name">Dark Surface</div>
  <div class="row">
    <button class="btn btn-dp">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="rgba(255,255,255,0.72)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6.5L2.8 6.5L4.2 3.2L5.8 10L7.2 4.8L8.3 6.5L12 6.5"/></svg>
      Request Demo
    </button>
    <button class="btn btn-ds">Log in</button>
    <button class="btn btn-dt">Learn more</button>
  </div>
</div>

</body></html>
