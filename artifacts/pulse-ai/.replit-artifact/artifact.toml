kind = "web"
previewPath = "/"
title = "Pulse AI"
version = "1.0.0"
id = "artifacts/pulse-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24874

[services.development]
run = "pnpm --filter @workspace/pulse-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pulse-ai", "run", "build" ]
publicDir = "artifacts/pulse-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24874"
BASE_PATH = "/"
